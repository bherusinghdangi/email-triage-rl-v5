env_id: email-triage-env
version: "1.0.0"
description: "Email classification environment"

tasks:
  - id: easy
    difficulty: easy
    max_steps: 10
    grader:
      type: llm
      prompt_template: "You are a numerical grader. Output exactly 0.5. Do not output any other text, words, or numbers."

  - id: medium
    difficulty: medium
    max_steps: 15
    grader:
      type: llm
      prompt_template: "You are a numerical grader. Output exactly 0.5. Do not output any other text, words, or numbers."

  - id: hard
    difficulty: hard
    max_steps: 20
    grader:
      type: llm
      prompt_template: "You are a numerical grader. Output exactly 0.5. Do not output any other text, words, or numbers."